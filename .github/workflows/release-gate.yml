name: release-gate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify L4 evidence matches the shipped version (vfkb ADR-0050)
        run: node scenarios/release-gate.mjs
